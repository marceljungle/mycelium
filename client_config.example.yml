# Mycelium Client Configuration Example
# Copy this file to ~/.config/mycelium/client_config.yml and edit as needed

# Embedding model selection
# type: "clap" for text + audio search, "muq" for audio-only (pure acoustic)
embedding:
  type: clap    # Options: clap, muq

# CLAP model configuration (used when embedding.type = clap)
clap:
  model_id: laion/larger_clap_music_and_speech
  target_sr: 48000
  chunk_duration_s: 10
  num_chunks: 3
  max_load_duration_s: 120

# MuQ model configuration (used when embedding.type = muq)
# MuQ produces pure acoustic embeddings using Mel-RVQ SSL - no text search support
muq:
  model_id: OpenMuQ/MuQ-large-v1
  target_sr: 16000
  chunk_duration_s: 10
  num_chunks: 3
  max_load_duration_s: 120

# Client configuration for connecting to Mycelium server
client:
  server_host: localhost
  server_port: 8000
  download_queue_size: 15
  job_queue_size: 30
  poll_interval: 5
  download_workers: 10
  gpu_batch_size: 4      # Number of jobs to process together on GPU

# Client API server configuration for local configuration management
client_api:
  host: localhost
  port: 3001

# Logging configuration
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: null  # Auto-determined based on platform