# Mycelium Client Configuration Example
# Copy this file to ~/.config/mycelium/client_config.yml and edit as needed

# Client configuration for connecting to Mycelium server
client:
  server_host: localhost
  server_port: 8000
  download_queue_size: 15
  job_queue_size: 30
  poll_interval: 5
  download_workers: 10
  gpu_batch_size: 4      # Number of jobs to process together on GPU
  micro_batch_size: 4    # Chunks per GPU forward pass (lower = less memory)

# Client API server configuration for local configuration management
client_api:
  host: localhost
  port: 3001

# Logging configuration
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: null  # Auto-determined based on platform