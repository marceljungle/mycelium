
name: Release, Build, and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Override version bump type"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish_to_test_pypi:
        description: "Upload artifacts to Test PyPI"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DEFAULT_BUMP: patch

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    name: Prepare release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      release_version: ${{ steps.metadata.outputs.release_version }}
      next_dev_version: ${{ steps.metadata.outputs.next_dev_version }}
      bump_type: ${{ steps.metadata.outputs.bump_type }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
      release_pr_number: ${{ steps.metadata.outputs.release_pr_number }}
      previous_tag: ${{ steps.metadata.outputs.previous_tag }}
      release_label: ${{ steps.metadata.outputs.release_label }}
      has_release_label: ${{ steps.metadata.outputs.has_release_label }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate release metadata
        id: metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MANUAL_BUMP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump_type || '' }}
          DEFAULT_BUMP: ${{ env.DEFAULT_BUMP }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/generate_release_metadata.py
          METADATA_JSON=$(./.github/scripts/generate_release_metadata.py)
          echo "$METADATA_JSON" > metadata.json

          RELEASE_VERSION=$(jq -r '.release_version' metadata.json)
          NEXT_DEV_VERSION=$(jq -r '.next_dev_version' metadata.json)
          BUMP_TYPE=$(jq -r '.bump_type' metadata.json)
          RELEASE_NOTES=$(jq -r '.release_notes' metadata.json)
          RELEASE_PR_NUMBER=$(jq -r '.release_pr_number // ""' metadata.json)
          PREVIOUS_TAG=$(jq -r '.previous_tag // ""' metadata.json)
          RELEASE_LABEL=$(jq -r '.release_label // ""' metadata.json)
          HAS_RELEASE_LABEL=$(jq -r '.has_release_label' metadata.json)

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_dev_version=$NEXT_DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "release_pr_number=$RELEASE_PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "release_label=$RELEASE_LABEL" >> "$GITHUB_OUTPUT"
          echo "has_release_label=$HAS_RELEASE_LABEL" >> "$GITHUB_OUTPUT"

          {
            echo 'release_notes<<EOF'
            echo "$RELEASE_NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build project artifacts
    needs: prepare
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.ref == 'refs/heads/main' &&
          needs.prepare.outputs.has_release_label == 'true'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply release version
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          set -euo pipefail
          sed -i.bak "s/^version = .*/version = \"$RELEASE_VERSION\"/" pyproject.toml
          rm pyproject.toml.bak

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend assets
        run: |
          chmod +x ./build.sh ./build_frontend.sh ./build_client_frontend.sh
          ./build.sh

      - name: Verify frontend build outputs
        run: |
          ls -la src/mycelium/frontend_dist/
          ls -la src/mycelium/client_frontend_dist/

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build Python distributions
        run: |
          python -m build

      - name: Verify package contents include frontend assets
        run: |
          python - <<'PY'
          import glob
          import tarfile

          tar_files = glob.glob('dist/mycelium-*.tar.gz')
          if not tar_files:
              raise SystemExit('No source distribution found in dist/')

          with tarfile.open(tar_files[0], 'r:gz') as archive:
              members = archive.getnames()
              frontend_files = [path for path in members if 'frontend_dist' in path]
              if not frontend_files:
                  raise SystemExit('Frontend files missing from source distribution')
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.ref == 'refs/heads/main' &&
          needs.prepare.outputs.has_release_label == 'true'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
      RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update version file and create release commit
        run: |
          set -euo pipefail
          sed -i.bak "s/^version = .*/version = \"$RELEASE_VERSION\"/" pyproject.toml
          rm pyproject.toml.bak
          git add pyproject.toml
          git commit -m "chore: release v$RELEASE_VERSION"
          git tag "v$RELEASE_VERSION"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v$RELEASE_VERSION"

      - name: Write release notes to file
        run: |
          cat <<'EOF' > RELEASE_NOTES.md
          ${{ needs.prepare.outputs.release_notes }}
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            --title "Release v$RELEASE_VERSION" \
            --notes-file RELEASE_NOTES.md \
            dist/*

  publish:
    name: Publish to package index
    needs:
      - prepare
      - build
      - release
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.ref == 'refs/heads/main' &&
          needs.prepare.outputs.has_release_label == 'true'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Upload to Test PyPI
        if: >-
          ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_test_pypi == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          verbose: true
          packages-dir: dist

      - name: Upload to PyPI
        if: >-
          ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_test_pypi == 'true') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          packages-dir: dist

  post-release:
    name: Prepare next development version
    needs:
      - prepare
      - publish
    if: >-
      ${{
        needs.publish.result == 'success' &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.ref == 'refs/heads/main' &&
            needs.prepare.outputs.has_release_label == 'true'
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      NEXT_DEV_VERSION: ${{ needs.prepare.outputs.next_dev_version }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update to next development version
        run: |
          set -euo pipefail
          sed -i.bak "s/^version = .*/version = \"$NEXT_DEV_VERSION\"/" pyproject.toml
          rm pyproject.toml.bak

      - name: Create bump branch if needed
        env:
          BUMP_BRANCH: chore/bump-${{ needs.prepare.outputs.release_version }}-to-${{ needs.prepare.outputs.next_dev_version }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$BUMP_BRANCH" >/dev/null 2>&1; then
            echo "Branch $BUMP_BRANCH already exists. Skipping creation."
            exit 0
          fi
          git checkout -b "$BUMP_BRANCH"
          git add pyproject.toml
          git commit -m "chore: prepare for $NEXT_DEV_VERSION"
          git push origin "$BUMP_BRANCH"

      - name: Open pull request to develop
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMP_BRANCH: chore/bump-${{ needs.prepare.outputs.release_version }}-to-${{ needs.prepare.outputs.next_dev_version }}
        run: |
          if gh pr list --state open --head "$BUMP_BRANCH" --json number | jq -e '.[]' >/dev/null 2>&1; then
            echo "Pull request for $BUMP_BRANCH already exists."
            exit 0
          fi
          gh pr create \
            --base develop \
            --head "$BUMP_BRANCH" \
            --title "chore: prepare for $NEXT_DEV_VERSION" \
            --body "Automatic version bump after releasing v$RELEASE_VERSION"
