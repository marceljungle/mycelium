---
name: Build and Publish to PyPI

'on':
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      test_upload:
        description: 'Upload to Test PyPI instead of PyPI'
        required: false
        default: false
        type: boolean

  # Automatic trigger on version tags
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          chmod +x ./build_frontend.sh
          ./build_frontend.sh

      - name: Verify frontend build
        run: |
          echo "Checking frontend build output..."
          ls -la src/mycelium/frontend_dist/
          ls -la src/mycelium/client_frontend_dist/
          echo "Frontend files built successfully"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build Python package
        run: |
          python -m build

      - name: Verify package contents
        run: |
          echo "Built packages:"
          ls -la dist/

          echo "Package contents check:"
          python -c "
          import tarfile
          import os
          # Check if frontend files are included in the source distribution
          with tarfile.open('dist/mycelium-0.1.0.tar.gz', 'r:gz') as tar:
              files = tar.getnames()
              frontend_files = [f for f in files if 'frontend_dist' in f]
              print(f'Frontend files in package: {len(frontend_files)}')
              if len(frontend_files) > 0:
                  print('✓ Frontend files are included in the package')
              else:
                  print('✗ Frontend files are missing!')
                  exit(1)
          "

      - name: Upload to Test PyPI
        if: ${{ github.event.inputs.test_upload == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          verbose: true

      - name: Upload to PyPI
        if: ${{ github.event.inputs.test_upload != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
