# Mycelium Configuration Example
# Copy this file to ~/.config/mycelium/config.yml and customize for your setup

# Plex server configuration
plex:
  url: http://localhost:32400
  token: null  # Replace with your Plex token
  music_library_name: Music

# CLAP model configuration
clap:
  model_id: laion/larger_clap_music_and_speech
  target_sr: 48000
  chunk_duration_s: 10
  batch_size: 16

# ChromaDB vector database configuration
chroma:
  db_path: null  # Will use platform-specific user data directory if null
  collection_name: my_music_library
  batch_size: 1000

# Track metadata database configuration
database:
  db_path: null  # Will use platform-specific user data directory if null

# API server configuration
api:
  host: 0.0.0.0
  port: 8000
  reload: false

# Client configuration for worker connections
client:
  server_host: localhost
  server_port: 8000
  model_id: laion/clap-htsat-unfused

# Logging configuration
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: null  # Will use platform-specific log directory if null